services:
  - type: web
    name: wpo-ai-reader-webapp
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: WPO_INVITE_CODE
        value: WPO2026ZHEN
      - key: WPO_ENABLE_ENV_LOGIN
        value: "false"
      - key: WORLDPANEL_HEADLESS
        value: "true"
      # Server-side AI planner (LLM-first). Defaults target Doubao (Volcano Ark),
      # so only the API key must be set here (as a secret) for the model to be
      # the default recognizer. Without it, the app falls back to rule-based
      # recognition. Override base URL / model / provider only to use a
      # different provider.
      - key: WPO_AI_API_KEY
        sync: false
      # - key: WPO_AI_BASE_URL   # default: https://ark.cn-beijing.volces.com/api/v3/chat/completions
      #   sync: false
      # - key: WPO_AI_MODEL      # default: ep-20260611143619-l7n26 (Doubao endpoint)
      #   sync: false
      # - key: WPO_AI_PROVIDER   # default: doubao
      #   sync: false
